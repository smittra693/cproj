<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riemann Sums Visualization</title>
    
    <script src="https://cjrtnc.cheerpj.com/3.0/loader.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        /* Container where your Java application will render */
        #app-container {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-width: 500px;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <h1>Riemann Sums Calculator</h1>
    <p>Visualizing mathematical integration using Java and CheerpJ</p>

    <div id="app-container">
        Loading runtime environment...
    </div>

    <script>
        // Initialize the CheerpJ environment first
        cheerpjInit().then(function() {
            // Clear the loading message once initialized
            document.getElementById('app-container').innerHTML = '';
            
            /* 3. Run your Java application.
               - Replace "YourJarFileName.jar" with the exact name of your uploaded JAR file.
               - Replace "MainClassName" with the name of your main class file (the one with the main method).
            */
            cheerpjCreateDisplay(-1, -1, document.getElementById('app-container'));
            cheerpjRunJar("/app/YourJarFileName.jar");
        });
    </script>

</body>
</html>
