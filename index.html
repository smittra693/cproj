<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Riemann Sum Visualization: y = x²</title>

    <style>

        body {

            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

            background-color: #f5f5f7;

            margin: 0;

            padding: 20px;

            display: flex;

            flex-direction: column;

            align-items: center;

        }

        .container {

            background-color: white;

            border-radius: 12px;

            box-shadow: 0 4px 20px rgba(0,0,0,0.08);

            padding: 24px;

            max-width: 900px;

            width: 100%;

        }

        h1 {

            font-size: 24px;

            color: #1d1d1f;

            margin-top: 0;

            text-align: center;

        }

        .controls {

            display: grid;

            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));

            gap: 16px;

            margin-bottom: 20px;

            background: #fbfbfd;

            padding: 16px;

            border-radius: 8px;

        }

        .control-group {

            display: flex;

            flex-direction: column;

        }

        label {

            font-size: 12px;

            font-weight: 600;

            color: #86868b;

            margin-bottom: 4px;

            text-transform: uppercase;

        }

        input, select {

            padding: 8px 12px;

            border: 1px solid #d2d2d7;

            border-radius: 6px;

            font-size: 14px;

        }

        button {

            grid-column: 1 / -1;

            background-color: #0071e3;

            color: white;

            border: none;

            padding: 12px;

            font-size: 16px;

            font-weight: 500;

            border-radius: 6px;

            cursor: pointer;

            transition: background 0.2s;

        }

        button:hover {

            background-color: #0077ed;

        }

        canvas {

            border: 1px solid #d2d2d7;

            border-radius: 8px;

            background-color: white;

            display: block;

            margin: 0 auto;

        }

    </style>

</head>

<body>



<div class="container">

    <h1>Riemann Sum Calculator & Integrator (y = x²)</h1>

    

    <div class="controls">

        <div class="control-group">

            <label for="method">Method</label>

            <select id="method">

                <option value="1">LRAM (Left-hand)</option>

                <option value="2">RRAM (Right-hand)</option>

                <option value="3">MRAM (Midpoint)</option>

                <option value="4">Trapezoidal Rule</option>

            </select>

        </div>

        <div class="control-group">

            <label for="boundA">Lower Bound (a)</label>

            <input type="number" id="boundA" value="0" step="any">

        </div>

        <div class="control-group">

            <label for="boundB">Upper Bound (b)</label>

            <input type="number" id="boundB" value="3" step="any">

        </div>

        <div class="control-group">

            <label for="intervals">Subintervals (n)</label>

            <input type="number" id="intervals" value="6" min="1">

        </div>

        <button onclick="updateGraph()">Calculate & Visualize</button>

    </div>



    <canvas id="graphCanvas" width="850" height="600"></canvas>

</div>



<script>

    function evaluateFunction(x) {

        return x * x;

    }



    function calculateExactIntegral(a, b) {

        return (Math.pow(b, 3) / 3.0) - (Math.pow(a, 3) / 3.0);

    }



    function calculateRiemannSum(method, a, b, n) {

        const dx = (b - a) / n;

        let sum = 0.0;



        for (let i = 0; i < n; i++) {

            let leftX = a + i * dx;

            let rightX = leftX + dx;

            let targetX = leftX;



            if (method === 2) targetX = rightX;

            else if (method === 3) targetX = leftX + dx / 2.0;



            if (method === 4) {

                sum += (evaluateFunction(leftX) + evaluateFunction(rightX)) / 2.0;

            } else {

                sum += evaluateFunction(targetX);

            }

        }

        return method === 4 ? sum * dx : sum * dx;

    }



    function updateGraph() {

        const canvas = document.getElementById('graphCanvas');

        const ctx = canvas.getContext('2d');

        

        // Inputs

        const method = parseInt(document.getElementById('method').value);

        const a = parseFloat(document.getElementById('boundA').value);

        const b = parseFloat(document.getElementById('boundB').value);

        const n = parseInt(document.getElementById('intervals').value);



        // Math Calculations

        const approxArea = calculateRiemannSum(method, a, b, n);

        const exactArea = calculateExactIntegral(a, b);

        const absoluteError = Math.abs(exactArea - approxArea);



        // Layout variables

        const padding = 60;

        const width = canvas.width;

        const height = canvas.height;



        const minX = Math.min(0, a) - 1;

        const maxX = Math.max(0, b) + 1;

        const minY = -1;

        const maxY = Math.max(a * a, b * b) + 2;



        // Coordinate conversion helper functions

        function toPixelX(mathX) {

            return padding + ((mathX - minX) / (maxX - minX)) * (width - 2 * padding);

        }

        function toPixelY(mathY) {

            return height - padding - ((mathY - minY) / (maxY - minY)) * (height - 2 * padding);

        }

        function toMathX(pixelX) {

            return minX + ((pixelX - padding) / (width - 2 * padding)) * (maxX - minX);

        }



        // Clear canvas

        ctx.clearRect(0, 0, width, height);



        const originY = toPixelY(0);

        const originX = toPixelX(0);



        // 1. Draw Background Grid Lines & Ticks

        ctx.lineWidth = 1;

        ctx.font = "12px sans-serif";

        

        // X Grid

        for (let x = Math.ceil(minX); x <= Math.floor(maxX); x++) {

            let pX = toPixelX(x);

            if (pX >= padding && pX <= width - padding) {

                ctx.strokeStyle = "#e6e6e6";

                ctx.beginPath(); ctx.moveTo(pX, padding); ctx.lineTo(pX, height - padding); ctx.stroke();

                

                ctx.strokeStyle = "#555555";

                ctx.beginPath(); ctx.moveTo(pX, originY - 4); ctx.lineTo(pX, originY + 4); ctx.stroke();

                ctx.fillStyle = "#000000";

                ctx.fillText(x, pX - 4, originY + 18);

            }

        }



        // Y Grid

        for (let y = Math.ceil(minY); y <= Math.floor(maxY); y++) {

            let pY = toPixelY(y);

            if (pY >= padding && pY <= height - padding) {

                ctx.strokeStyle = "#e6e6e6";

                ctx.beginPath(); ctx.moveTo(padding, pY); ctx.lineTo(width - padding, pY); ctx.stroke();

                

                ctx.strokeStyle = "#555555";

                ctx.beginPath(); ctx.moveTo(originX - 4, pY); ctx.lineTo(originX + 4, pY); ctx.stroke();

                if (y !== 0) {

                    ctx.fillStyle = "#000000";

                    ctx.fillText(y, originX - 22, pY + 4);

                }

            }

        }



        // 2. Main Axis Lines

        ctx.strokeStyle = "#000000";

        ctx.lineWidth = 2;

        ctx.beginPath(); ctx.moveTo(padding, originY); ctx.lineTo(width - padding, originY); ctx.stroke();

        ctx.beginPath(); ctx.moveTo(originX, padding); ctx.lineTo(originX, height - padding); ctx.stroke();

        ctx.fillText("X", width - padding + 10, originY + 5);

        ctx.fillText("Y", originX - 4, padding - 10);



        // 3. Draw Riemann Shapes

        const dx = (b - a) / n;

        ctx.lineWidth = 1.5;



        for (let i = 0; i < n; i++) {

            let leftX = a + i * dx;

            let rightX = leftX + dx;

            let targetX = leftX;



            if (method === 2) targetX = rightX;

            else if (method === 3) targetX = leftX + dx / 2.0;



            let yVal = targetX * targetX;

            let pLeftX = toPixelX(leftX);

            let pRightX = toPixelX(rightX);

            let pWidth = pRightX - pLeftX;



            ctx.fillStyle = "rgba(135, 206, 250, 0.4)";

            ctx.strokeStyle = "blue";



            if (method === 4) {

                let yLeft = leftX * leftX;

                let yRight = rightX * rightX;

                

                ctx.beginPath();

                ctx.moveTo(pLeftX, toPixelY(0));

                ctx.lineTo(pRightX, toPixelY(0));

                ctx.lineTo(pRightX, toPixelY(yRight));

                ctx.lineTo(pLeftX, toPixelY(yLeft));

                ctx.closePath();

                ctx.fill();

                ctx.stroke();

            } else {

                let pTopY = toPixelY(yVal);

                let pBaseY = toPixelY(0);

                let pHeight = pBaseY - pTopY;



                ctx.fillRect(pLeftX, pTopY, pWidth, pHeight);

                ctx.strokeRect(pLeftX, pTopY, pWidth, pHeight);

            }

        }



        // 4. Draw Curve y = x²

        ctx.strokeStyle = "red";

        ctx.lineWidth = 2.5;

        ctx.beginPath();

        let first = true;



        for (let pixelX = padding; pixelX < width - padding; pixelX++) {

            let mathX = toMathX(pixelX);

            let mathY = mathX * mathX;

            let pixelY = toPixelY(mathY);



            if (pixelY >= padding && pixelY <= height - padding) {

                if (first) {

                    ctx.moveTo(pixelX, pixelY);

                    first = false;

                } else {

                    ctx.lineTo(pixelX, pixelY);

                }

            }

        }

        ctx.stroke();



        // 5. Print Text Metrics

        ctx.fillStyle = "black";

        ctx.font = "bold 13px sans-serif";

        ctx.fillText("Function: y = x²", padding, padding - 35);

        ctx.fillText(`Interval: [${a}, ${b}] (n = ${n})`, padding, padding - 15);

        

        let textX = width - 240;

        ctx.fillText(`Approximated Area: ${approxArea.toFixed(5)}`, textX, padding - 45);

        ctx.fillText(`Exact Integral Area: ${exactArea.toFixed(5)}`, textX, padding - 25);

        ctx.fillStyle = "rgb(150, 0, 0)";

        ctx.fillText(`Absolute Error:         ${absoluteError.toFixed(5)}`, textX, padding - 5);

    }



    // Initial draw on page load

    window.onload = updateGraph;

</script>



</body>

</html>
